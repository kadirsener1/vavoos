version: '3.8'

services:
  playlist-updater:
    build: .
    container_name: iptv-playlist-updater
    restart: unless-stopped
    volumes:
      - ./output:/app/output
    environment:
      OUTPUT_DIR: /app/output
      PYTHONUNBUFFERED: 1
    networks:
      - playlist-network

networks:
  playlist-network:
    driver: bridge
